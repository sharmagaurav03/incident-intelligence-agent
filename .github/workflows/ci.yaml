name: ci
on:
  push: {branches: [main]}
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix: {python: ["3.10", "3.12"]}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python }}"}
      - run: pip install -r requirements-dev.txt
      - run: python -m pyflakes src/triage_agent tests
      - run: python -m pytest -q
      - run: PYTHONPATH=src python -m triage_agent run --config config/default.yaml
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t triage-agent:${{ github.sha }} .
  # one real-LLM incident, manual dispatch only (costs money)
  real-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -r requirements.txt
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIAGE__llm__mode: real
        run: PYTHONPATH=src python -m triage_agent run --config config/default.yaml --incident INC1003
